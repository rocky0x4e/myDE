
[module/sepR2]
inherit = base/module-right
click-left = GAP=10 ~/.config/polybar/scripts/module-toggle.sh tray closeWindow simplePS
click-right = ~/.config/polybar/scripts/module-toggle.sh tray closeWindow simplePS
format = ""
format-background = ${colors.bg}
format-foreground = ${colors.fg}

[module/end]
type = custom/text
format = "%{T7}%{T-}"
format-foreground = ${colors.bg-left}
format-background = ${colors.bar-bg}

[module/start]
type = custom/text
format = "%{T7}%{T-}"
format-foreground = ${colors.bg-right}
format-background = ${colors.bar-bg}